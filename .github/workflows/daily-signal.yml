name: Daily Signal Analysis

on:
  schedule:
    - cron: '30 7 * * 1-5'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force refresh all data'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy efinance akshare

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: cache
          key: etf-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: etf-cache-${{ runner.os }}-

      - name: Run daily analysis
        run: python daily_analysis.py

      - name: Update dashboard
        if: always()
        run: python update_dashboard.py

      - name: Commit and push
        if: always()
        run: |
          git config user.name "ETF-GO Bot"
          git config user.email "bot@etf-go.local"
          git add index.html signal_result.json signal_status.html
          git add -f cache/
          git diff --cached --quiet || git commit -m "auto: daily analysis $(date +%Y-%m-%d)"
          git push
